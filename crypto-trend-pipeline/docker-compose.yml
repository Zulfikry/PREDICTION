services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: crypto_pipeline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://pipeline:pipeline@db:5432/crypto_pipeline
      SYMBOLS: BTCUSDT,ETHUSDT,SOLUSDT
      INTERVAL: 1h
    ports:
      - "8000:8000"

volumes:
  pgdata:
